<svg width="100%" viewBox="0 0 680 468" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Multimodal melanoma classification architecture</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- BRANCH LABELS -->
<text x="170" y="26" text-anchor="middle" style="fill:rgb(20,20,19);font-family:sans-serif;font-size:14px;font-weight:500">Image branch</text>
<text x="510" y="26" text-anchor="middle" style="fill:rgb(20,20,19);font-family:sans-serif;font-size:14px;font-weight:500">Metadata branch</text>

<!-- IMAGE INPUT -->
<rect x="70" y="38" width="200" height="50" rx="8" style="fill:rgb(241,239,232);stroke:rgb(95,94,90);stroke-width:0.5"/>
<text x="170" y="57" text-anchor="middle" dominant-baseline="central" style="fill:rgb(68,68,65);font-family:sans-serif;font-size:14px;font-weight:500">Skin lesion image</text>
<text x="170" y="75" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95,94,90);font-family:sans-serif;font-size:12px">224 x 224 px, RGB</text>
<line x1="170" y1="88" x2="170" y2="106" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5"/>

<!-- EFFICIENTNET -->
<rect x="70" y="106" width="200" height="62" rx="8" style="fill:rgb(238,237,254);stroke:rgb(83,74,183);stroke-width:0.5"/>
<text x="170" y="126" text-anchor="middle" dominant-baseline="central" style="fill:rgb(60,52,137);font-family:sans-serif;font-size:14px;font-weight:500">EfficientNet-B0</text>
<text x="170" y="146" text-anchor="middle" dominant-baseline="central" style="fill:rgb(83,74,183);font-family:sans-serif;font-size:12px">Pretrained on ImageNet</text>
<text x="170" y="162" text-anchor="middle" dominant-baseline="central" style="fill:rgb(83,74,183);font-family:sans-serif;font-size:12px">Output: 1280-dim</text>
<line x1="170" y1="168" x2="170" y2="186" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5"/>

<!-- IMAGE FEATURES -->
<rect x="90" y="186" width="160" height="40" rx="8" style="fill:rgb(241,239,232);stroke:rgb(95,94,90);stroke-width:0.5"/>
<text x="170" y="202" text-anchor="middle" dominant-baseline="central" style="fill:rgb(68,68,65);font-family:sans-serif;font-size:14px;font-weight:500">Image features</text>
<text x="170" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95,94,90);font-family:sans-serif;font-size:12px">[1280-dim]</text>

<!-- METADATA INPUT -->
<rect x="410" y="38" width="200" height="50" rx="8" style="fill:rgb(241,239,232);stroke:rgb(95,94,90);stroke-width:0.5"/>
<text x="510" y="57" text-anchor="middle" dominant-baseline="central" style="fill:rgb(68,68,65);font-family:sans-serif;font-size:14px;font-weight:500">Patient metadata</text>
<text x="510" y="75" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95,94,90);font-family:sans-serif;font-size:12px">Age, sex, body site (9-dim)</text>
<line x1="510" y1="88" x2="510" y2="106" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5"/>

<!-- METADATA MLP -->
<rect x="410" y="106" width="200" height="82" rx="8" style="fill:rgb(225,245,238);stroke:rgb(15,110,86);stroke-width:0.5"/>
<text x="510" y="124" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8,80,65);font-family:sans-serif;font-size:14px;font-weight:500">Metadata MLP</text>
<text x="510" y="142" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-family:sans-serif;font-size:12px">Linear(9→64) + ReLU</text>
<text x="510" y="158" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-family:sans-serif;font-size:12px">+ Dropout(0.3) + Linear(64→32)</text>
<text x="510" y="174" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-family:sans-serif;font-size:12px">+ ReLU → Output: 32-dim</text>
<line x1="510" y1="188" x2="510" y2="206" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5"/>

<!-- METADATA FEATURES -->
<rect x="430" y="206" width="160" height="40" rx="8" style="fill:rgb(241,239,232);stroke:rgb(95,94,90);stroke-width:0.5"/>
<text x="510" y="222" text-anchor="middle" dominant-baseline="central" style="fill:rgb(68,68,65);font-family:sans-serif;font-size:14px;font-weight:500">Metadata features</text>
<text x="510" y="238" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95,94,90);font-family:sans-serif;font-size:12px">[32-dim]</text>

<!-- ARROWS TO FUSION -->
<line x1="170" y1="226" x2="170" y2="284" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5"/>
<line x1="510" y1="246" x2="510" y2="284" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5"/>
<line x1="171" y1="288" x2="310" y2="288" stroke="rgb(115,114,108)" stroke-width="1" opacity="0.4" fill="none"/>
<line x1="509" y1="288" x2="372" y2="288" stroke="rgb(115,114,108)" stroke-width="1" opacity="0.4" fill="none"/>

<!-- FUSION -->
<rect x="270" y="272" width="140" height="50" rx="8" style="fill:rgb(250,236,231);stroke:rgb(153,60,29);stroke-width:0.5"/>
<text x="340" y="291" text-anchor="middle" dominant-baseline="central" style="fill:rgb(113,43,19);font-family:sans-serif;font-size:14px;font-weight:500">Fusion</text>
<text x="340" y="309" text-anchor="middle" dominant-baseline="central" style="fill:rgb(153,60,29);font-family:sans-serif;font-size:12px">Fused vector [1312-dim]</text>
<line x1="340" y1="322" x2="340" y2="340" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5"/>

<!-- CLASSIFIER -->
<rect x="200" y="340" width="280" height="66" rx="8" style="fill:rgb(250,236,231);stroke:rgb(153,60,29);stroke-width:0.5"/>
<text x="340" y="358" text-anchor="middle" dominant-baseline="central" style="fill:rgb(113,43,19);font-family:sans-serif;font-size:14px;font-weight:500">Classifier head</text>
<text x="340" y="376" text-anchor="middle" dominant-baseline="central" style="fill:rgb(153,60,29);font-family:sans-serif;font-size:12px">Dropout + FC(1312→256) + ReLU</text>
<text x="340" y="394" text-anchor="middle" dominant-baseline="central" style="fill:rgb(153,60,29);font-family:sans-serif;font-size:12px">+ Dropout + FC(256→1)</text>
<line x1="340" y1="406" x2="340" y2="424" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5"/>

<!-- OUTPUT -->
<rect x="255" y="424" width="170" height="30" rx="8" style="fill:rgb(241,239,232);stroke:rgb(95,94,90);stroke-width:0.5"/>
<text x="340" y="439" text-anchor="middle" dominant-baseline="central" style="fill:rgb(68,68,65);font-family:sans-serif;font-size:14px;font-weight:500">P(melanoma) ∈ [0, 1]</text>

</svg>
